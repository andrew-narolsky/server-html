services:

  ### PHP-FPM Container #######################################

  wp_php-fpm:
    container_name: wp_php-fpm
    restart: unless-stopped
    environment:
      - TZ=Europe/Kyiv
    build:
      context: php-fpm
      args:
        - PUID=${USER_PUID}
        - INSTALL_MEMCACHED=${PHP_FPM_INSTALL_MEMCACHED}
        - INSTALL_OPCACHE=${PHP_FPM_INSTALL_OPCACHE}
        - INSTALL_IMAGEMAGICK=${INSTALL_IMAGEMAGICK}
        - INSTALL_IMAGE_OPTIMIZERS=${PHP_FPM_INSTALL_IMAGE_OPTIMIZERS}
        - BASE_IMAGE_TAG_PREFIX=${PHP_FPM_BASE_IMAGE_TAG_PREFIX}
        - LARADOCK_PHP_VERSION=${PHP_VERSION}
    volumes:
      - ./html:/var/www/html
      - ./php-fpm/php.ini:/usr/local/etc/php/php.ini:delegated
    expose:
      - "9000"
    networks:
      - backend

  ### Nginx Server Container ##################################

  wp_nginx:
    depends_on:
      - wp_php-fpm
    container_name: wp_nginx
    restart: unless-stopped
    build:
      context: nginx
      args:
        - PUID=${USER_PUID}
        - PHP_UPSTREAM=wp_php-fpm
    volumes:
      - ./:/var/www/:delegated
      - ${NGINX_HOST_LOG_PATH}:/var/log/nginx:cached
      - ${NGINX_SITES_PATH}:/etc/nginx/sites-available:delegated
    ports:
      - "${NGINX_HOST_HTTP_PORT}:80"
      - "${NGINX_HOST_HTTPS_PORT}:443"
    networks:
      - backend

### Networks Setup ############################################

networks:
  backend:
    driver: "bridge"
